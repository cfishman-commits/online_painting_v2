<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Painter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="decor-surface" aria-hidden="true">
          <div class="decor-icon decor-bolt">
            <svg viewBox="0 0 64 64" role="presentation">
              <path d="M38 2 12 34h18L24 62l28-36H34z" fill="currentColor" />
            </svg>
          </div>
          <div class="decor-icon decor-cap-shield">
            <svg viewBox="0 0 64 64" role="presentation">
              <circle cx="32" cy="32" r="18" fill="#ef4444" />
              <circle cx="32" cy="32" r="13" fill="#facc15" />
              <circle cx="32" cy="32" r="8" fill="#0f172a" />
              <path
                d="M32 24.5 33.7 29h4.8l-3.9 2.8L36.2 37 32 34.3 27.8 37l1.6-5.2-3.9-2.8h4.8z"
                fill="#facc15"
              />
            </svg>
          </div>
        </div>
        <h1>Hero Painter</h1>
        <p>Choose a character, pick a color, and start painting.</p>
      </header>

      <main class="app-main">
        <aside class="sidebar">
          <div class="decor-surface" aria-hidden="true">
            <div class="decor-icon decor-bat-sidebar">
              <svg viewBox="0 0 64 64" role="presentation">
                <!-- Bow + arrow -->
                <path
                  d="M18 10c-4 6-6 14-6 22s2 16 6 22"
                  fill="none"
                  stroke="#e5e7eb"
                  stroke-width="4"
                  stroke-linecap="round"
                />
                <path
                  d="M18 10c18 10 28 22 28 22s-10 12-28 22"
                  fill="none"
                  stroke="#e5e7eb"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 32h44"
                  fill="none"
                  stroke="#e5e7eb"
                  stroke-width="3"
                  stroke-linecap="round"
                />
                <path
                  d="M54 32l-7-4m7 4-7 4"
                  fill="none"
                  stroke="#e5e7eb"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
          </div>
          <h2>Characters</h2>
          <div id="character-list" class="character-list">
            <!-- Filled dynamically -->
          </div>

          <h2>Colors</h2>
          <div id="palette" class="palette">
            <!-- Filled dynamically -->
          </div>

          <div class="controls">
            <div class="control-group">
              <span>Tool</span>
              <div class="tool-toggle">
                <button id="tool-brush" class="btn tertiary active">Brush</button>
                <button id="tool-fill" class="btn tertiary">Fill</button>
                <button id="tool-eraser" class="btn tertiary">Eraser</button>
              </div>
            </div>
            <label class="control-group">
              <span>Brush size</span>
              <input
                id="brush-size"
                type="range"
                min="2"
                max="40"
                value="12"
              />
            </label>
            <div class="control-group">
              <span>Zoom</span>
              <div class="zoom-controls">
                <button id="zoom-out" class="btn tertiary small">-</button>
                <span id="zoom-label" class="zoom-label">100%</span>
                <button id="zoom-in" class="btn tertiary small">+</button>
              </div>
            </div>
            <button id="clear-btn" class="btn secondary">Clear canvas</button>
            <button id="save-btn" class="btn secondary">Save painting</button>
          </div>
        </aside>

        <section class="canvas-panel">
          <div class="canvas-wrapper">
            <div class="canvas-inner" id="canvas-inner">
              <canvas id="paint-layer"></canvas>
              <canvas id="lineart-layer"></canvas>
            </div>
          </div>
          <div class="canvas-footer">
            <span id="current-character-label">Select a character to begin.</span>
          </div>
          <section class="gallery">
            <div class="gallery-header">
              <h2>Saved gallery</h2>
              <p>Saved paintings live here so you can clear your canvas and start fresh any time.</p>
            </div>
            <div id="gallery-grid" class="gallery-grid">
              <!-- Thumbnails injected by app.js -->
            </div>
          </section>
        </section>
      </main>
    </div>

    <div id="lightbox" class="lightbox" aria-hidden="true">
      <div class="lightbox-backdrop"></div>
      <div class="lightbox-content" role="dialog" aria-modal="true">
        <button id="lightbox-close" class="lightbox-close" aria-label="Close painting view">
          ×
        </button>
        <img id="lightbox-image" class="lightbox-image" alt="Saved painting" />
        <div class="lightbox-meta">
          <span id="lightbox-title"></span>
          <span id="lightbox-date"></span>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
